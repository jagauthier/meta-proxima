BB_CONF_FRAGMENT_SUMMARY = "Configure build settings for WARP project"
BB_CONF_FRAGMENT_DESCRIPTION = "Build settings including package classes, SDK machine, image features, PR service, hash server, and buildhistory"
# Package format
PACKAGE_CLASSES ?= "package_ipk"

# SDK machine
SDKMACHINE ?= "x86_64"

# Extra image features
EXTRA_IMAGE_FEATURES = "allow-empty-password allow-root-login empty-root-password post-install-logging"

# User classes for build statistics
USER_CLASSES ?= "buildstats"

# Patch resolution - disable interactive
PATCHRESOLVE = "noop"

# Don't generate mirror tarballs for SCM repos
BB_GENERATE_MIRROR_TARBALLS = "0"

# Keep one set of images by default
RM_OLD_IMAGE = "1"

# Enable local PR service for binary feeds
PRSERV_HOST = "localhost:0"

# Enable hash equiv server
BB_SIGNATURE_HANDLER = "OEEquivHash"
BB_HASHSERVE = "auto"

# Enable buildhistory
INHERIT += "buildhistory"
BUILDHISTORY_COMMIT = "1"

# Terminal types
TERMCMD = "${XTERM_TERMCMD}"
TERMCMDRUN = "${XTERM_TERMCMDRUN}"
