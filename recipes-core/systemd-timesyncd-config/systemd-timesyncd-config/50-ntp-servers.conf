# Drop-in configuration for systemd-timesyncd
# This file extends the default /etc/systemd/timesyncd.conf configuration

[Time]
# Use Google's public NTP servers as primary
NTP=time1.google.com time2.google.com time3.google.com time4.google.com

# Fallback to pool.ntp.org if Google servers are unavailable
FallbackNTP=0.pool.ntp.org 1.pool.ntp.org 2.pool.ntp.org 3.pool.ntp.org
